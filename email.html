// Dropdowns automatisch füllen
function fuelleDropdown(id) {

    let select = document.getElementById(id);

    // Standardoption
    let standard = document.createElement("option");
    standard.value = "";
    standard.textContent = "-- Optional --";
    select.appendChild(standard);

    // Empfänger hinzufügen
    empfaengerListe.forEach(person => {

        let option = document.createElement("option");

        option.value = person.email;
        option.textContent = person.name;

        select.appendChild(option);
    });
}

// Alle Dropdowns erzeugen
fuelleDropdown("empfaenger1");
fuelleDropdown("empfaenger2");
fuelleDropdown("empfaenger3");
fuelleDropdown("empfaenger4");


// Text aus URL lesen
function getText() {

    let params = new URLSearchParams(window.location.search);

    return params.get("body") || "";
}


// Mail senden
function senden() {

    let e1 = document.getElementById("empfaenger1").value;
    let e2 = document.getElementById("empfaenger2").value;
    let e3 = document.getElementById("empfaenger3").value;
    let e4 = document.getElementById("empfaenger4").value;

    let text = getText();

    let emails = [];

    // Marco immer hinzufügen
    let marco = "marco.wueest@lu.ch";

    emails.push(marco);

    // Alle ausgewählten Empfänger
    let alleEmpfaenger = [e1, e2, e3, e4];

    alleEmpfaenger.forEach(email => {

        if (
            email &&
            !emails.includes(email)
        ) {
            emails.push(email);
        }
    });

    let empfaengerString = emails.join(";");

    // Mail öffnen
    window.location.href =
        "mailto:" + empfaengerString +
        "?subject=" + encodeURIComponent("Info Festnahme") +
        "&body=" + encodeURIComponent(text);
}

</script>
